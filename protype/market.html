<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场行情 - 实时盯盘助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#0052D9', // TDesign Brand Blue
                        success: '#00A870', // TDesign Success Green
                        error: '#E34D59', // TDesign Error Red
                        gray: {
                            50: '#f3f3f3',
                            100: '#eeeeee',
                            400: '#999999',
                            900: '#111111'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased pb-20">

    <!-- Header -->
    <header class="bg-white sticky top-0 z-10 px-4 py-3 shadow-sm">
        <h1 class="text-lg font-bold text-center">市场行情</h1>
    </header>

    <!-- Global Indices -->
    <div class="px-4 py-3">
        <h2 class="text-sm font-bold text-gray-500 mb-2">全球指数</h2>
        <div class="grid grid-cols-2 gap-3">
            <!-- Index 1: S&P 500 (Up) -->
            <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-error">
                <div class="text-xs text-gray-400">S&P 500</div>
                <div class="text-lg font-bold mt-1">4,450.32</div>
                <div class="text-xs text-error font-medium flex items-center mt-1">
                    <i class="fas fa-caret-up mr-1"></i> +0.45%
                </div>
            </div>

            <!-- Index 2: Nasdaq (Down) -->
            <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-success">
                <div class="text-xs text-gray-400">Nasdaq</div>
                <div class="text-lg font-bold mt-1">13,780.22</div>
                <div class="text-xs text-success font-medium flex items-center mt-1">
                    <i class="fas fa-caret-down mr-1"></i> -0.12%
                </div>
            </div>

             <!-- Index 3: HSI (Up) -->
             <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-error">
                <div class="text-xs text-gray-400">恒生指数</div>
                <div class="text-lg font-bold mt-1">16,340.10</div>
                <div class="text-xs text-error font-medium flex items-center mt-1">
                    <i class="fas fa-caret-up mr-1"></i> +1.20%
                </div>
            </div>

             <!-- Index 4: CSI 300 (Down) -->
             <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-success">
                <div class="text-xs text-gray-400">沪深300</div>
                <div class="text-lg font-bold mt-1">3,340.50</div>
                <div class="text-xs text-success font-medium flex items-center mt-1">
                    <i class="fas fa-caret-down mr-1"></i> -0.50%
                </div>
            </div>
        </div>
    </div>

    <!-- Hot Sectors -->
    <div class="px-4 py-2 mt-2">
        <div class="flex justify-between items-center mb-3">
            <h2 class="text-sm font-bold text-gray-500">热门板块</h2>
            <span class="text-xs text-brand cursor-pointer">更多 ></span>
        </div>
        
        <div class="bg-white rounded-lg shadow-sm divide-y divide-gray-100">
            <!-- Sector 1 -->
            <div class="flex justify-between items-center p-4">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded bg-blue-100 text-brand flex items-center justify-center mr-3 text-xs font-bold">AI</div>
                    <span class="text-sm font-medium">人工智能</span>
                </div>
                <span class="text-sm font-bold text-error">+3.24%</span>
            </div>

            <!-- Sector 2 -->
            <div class="flex justify-between items-center p-4">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded bg-green-100 text-green-700 flex items-center justify-center mr-3 text-xs font-bold">EV</div>
                    <span class="text-sm font-medium">新能源车</span>
                </div>
                <span class="text-sm font-bold text-success">-1.12%</span>
            </div>

            <!-- Sector 3 -->
            <div class="flex justify-between items-center p-4">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded bg-purple-100 text-purple-700 flex items-center justify-center mr-3 text-xs font-bold">Chip</div>
                    <span class="text-sm font-medium">半导体</span>
                </div>
                <span class="text-sm font-bold text-error">+0.85%</span>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-2 pb-4 safe-area-bottom z-50 shadow-t-sm">
        <a href="index.html" class="flex flex-col items-center text-gray-400 hover:text-brand transition">
            <i class="fas fa-list-ul text-xl mb-1"></i>
            <span class="text-[10px]">自选</span>
        </a>
        <a href="market.html" class="flex flex-col items-center text-brand">
            <i class="fas fa-globe text-xl mb-1"></i>
            <span class="text-[10px]">市场</span>
        </a>
        <a href="me.html" class="flex flex-col items-center text-gray-400 hover:text-brand transition">
            <i class="fas fa-user text-xl mb-1"></i>
            <span class="text-[10px]">我的</span>
        </a>
    </nav>

</body>
</html>
