<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时盯盘助手 - 自选</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#0052D9', // TDesign Brand Blue
                        success: '#00A870', // TDesign Success Green
                        error: '#E34D59', // TDesign Error Red
                        gray: {
                            50: '#f3f3f3',
                            100: '#eeeeee',
                            400: '#999999',
                            900: '#111111'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased pb-20">

    <!-- Header -->
    <header class="bg-white sticky top-0 z-10 px-4 py-3 shadow-sm">
        <h1 class="text-lg font-bold text-center">我的自选</h1>
    </header>

    <!-- Search Bar -->
    <div class="px-4 py-3 bg-white">
        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                <i class="fas fa-search"></i>
            </span>
            <input type="text" placeholder="搜索股票代码 (如 AAPL)" 
                class="w-full bg-gray-100 text-sm py-2 pl-10 pr-4 rounded-full focus:outline-none focus:ring-2 focus:ring-brand focus:bg-white transition-colors">
        </div>
    </div>

    <!-- Stock List -->
    <div class="px-4 mt-2 space-y-3">
        
        <!-- Stock Item: AAPL -->
        <a href="stock.html" class="block bg-white p-4 rounded-lg shadow-sm active:bg-gray-50 transition">
            <div class="flex justify-between items-center">
                <div>
                    <div class="text-base font-bold">AAPL</div>
                    <div class="text-xs text-gray-400 mt-1">Apple Inc.</div>
                </div>
                <div class="text-right">
                    <div class="text-lg font-bold">178.35</div>
                    <div class="text-xs font-medium px-2 py-0.5 rounded bg-error/10 text-error inline-block mt-1">+1.25%</div>
                </div>
            </div>
        </a>

        <!-- Stock Item: TSLA -->
        <a href="stock.html" class="block bg-white p-4 rounded-lg shadow-sm active:bg-gray-50 transition">
            <div class="flex justify-between items-center">
                <div>
                    <div class="text-base font-bold">TSLA</div>
                    <div class="text-xs text-gray-400 mt-1">Tesla, Inc.</div>
                </div>
                <div class="text-right">
                    <div class="text-lg font-bold">245.60</div>
                    <div class="text-xs font-medium px-2 py-0.5 rounded bg-success/10 text-success inline-block mt-1">-0.85%</div>
                </div>
            </div>
        </a>

        <!-- Stock Item: NVDA -->
        <a href="stock.html" class="block bg-white p-4 rounded-lg shadow-sm active:bg-gray-50 transition">
            <div class="flex justify-between items-center">
                <div>
                    <div class="text-base font-bold">NVDA</div>
                    <div class="text-xs text-gray-400 mt-1">NVIDIA Corp.</div>
                </div>
                <div class="text-right">
                    <div class="text-lg font-bold">460.18</div>
                    <div class="text-xs font-medium px-2 py-0.5 rounded bg-error/10 text-error inline-block mt-1">+2.40%</div>
                </div>
            </div>
        </a>

         <!-- Stock Item: BABA -->
         <a href="stock.html" class="block bg-white p-4 rounded-lg shadow-sm active:bg-gray-50 transition">
            <div class="flex justify-between items-center">
                <div>
                    <div class="text-base font-bold">BABA</div>
                    <div class="text-xs text-gray-400 mt-1">Alibaba Group</div>
                </div>
                <div class="text-right">
                    <div class="text-lg font-bold">88.20</div>
                    <div class="text-xs font-medium px-2 py-0.5 rounded bg-error/10 text-error inline-block mt-1">+0.50%</div>
                </div>
            </div>
        </a>

    </div>

    <!-- Empty State (Hidden for demo) -->
    <!-- 
    <div class="flex flex-col items-center justify-center mt-20 text-gray-400">
        <i class="fas fa-chart-line text-4xl mb-4"></i>
        <span class="text-sm">暂无自选股，快去添加吧</span>
    </div> 
    -->

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-2 pb-4 safe-area-bottom z-50">
        <a href="index.html" class="flex flex-col items-center text-brand">
            <i class="fas fa-list-ul text-xl mb-1"></i>
            <span class="text-[10px]">自选</span>
        </a>
        <a href="market.html" class="flex flex-col items-center text-gray-400 hover:text-brand transition">
            <i class="fas fa-globe text-xl mb-1"></i>
            <span class="text-[10px]">市场</span>
        </a>
        <a href="me.html" class="flex flex-col items-center text-gray-400 hover:text-brand transition">
            <i class="fas fa-user text-xl mb-1"></i>
            <span class="text-[10px]">我的</span>
        </a>
    </nav>

</body>
</html>
